<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phone Directory</title>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f2f2;padding:15px}
.box{max-width:500px;margin:auto;background:#fff;padding:15px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0}
.card{background:#e9f5ff;padding:10px;margin:5px;border-radius:8px}
button{background:#007bff;color:#fff;border:none;border-radius:6px}
.call{background:#28a745}
.hidden{display:none}
</style>
</head>

<body>

<div class="box" id="authBox">
<h2>🔐 Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<div class="box hidden" id="appBox">
<h2>📞 Directory</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="addContact()">Add Contact</button>

<hr>

<input id="search" placeholder="Search (min 3 chars)" onkeyup="searchData()">

<div id="results"></div>

<br>
<button onclick="logout()">Logout</button>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://pgkzechdqxvogvrpfjxt.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBna3plY2hkcXh2b2d2cnBmanh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDA0NDUsImV4cCI6MjA5MjE3NjQ0NX0.qj22KxdEnu3SbweXAAnBveozDmYScUXXvukNuWCjgdE"
);

let user = null;

// SIGNUP
async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Signup success. Now login.");
}

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("appBox").classList.remove("hidden");

  loadContacts();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// ADD CONTACT
async function addContact(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const { error } = await supabase.from("contacts").insert([
    {
      user_id: user.id,
      name,
      phone
    }
  ]);

  if(error){
    alert(error.message);
  }else{
    alert("Contact added");
  }
}

// LOAD CONTACTS
let contacts = [];

async function loadContacts(){
  const { data } = await supabase.from("contacts").select("*");
  contacts = data;
}

// SEARCH
function searchData(){
  const q = document.getElementById("search").value.toLowerCase();

  if(q.length < 3){
    document.getElementById("results").innerHTML = "";
    return;
  }

  const res = contacts.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q)
  );

  let html = "";

  res.forEach(c=>{
    html += `
      <div class="card">
        <b>${c.name}</b><br>
        ${c.phone}<br>
        <a href="tel:${c.phone}">
          <button class="call">📞 Call</button>
        </a>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
